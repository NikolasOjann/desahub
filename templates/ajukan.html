<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DesaHub - Pengajuan Surat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h3 class="mb-0">Portal Administrasi DesaHub</h3>
                    <small>Layanan Pengajuan Surat Mandiri</small>
                </div>
                <div class="card-body p-4">
                    
                    <form method="POST" enctype="multipart/form-data">
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nomor Induk Kependudukan (NIK)</label>
                            <input type="text" class="form-control" name="nik" placeholder="Masukkan 16 digit NIK" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Nama Lengkap</label>
                            <input type="text" class="form-control" name="nama" placeholder="Sesuai KTP" required>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Jenis Surat</label>
                            <select class="form-select" name="jenis_surat" required>
                                <option value="" disabled selected>Pilih jenis surat...</option>
                                <option value="Surat Domisili">Surat Keterangan Domisili</option>
                                <option value="Surat Keterangan Usaha">Surat Keterangan Usaha (SKU)</option>
                                <option value="Surat Pengantar RT/RW">Surat Pengantar RT/RW</option>
                            </select>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-bold">Keperluan</label>
                            <textarea class="form-control" name="keperluan" rows="3" placeholder="Jelaskan keperluan pembuatan surat..." required></textarea>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-bold">Upload Dokumen (KTP)</label>
                            <input type="file" class="form-control" name="file_ktp" accept="image/*,.pdf" required>
                            <div class="form-text">Format didukung: JPG, PNG, PDF. Maksimal 2MB.</div>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg">Kirim Pengajuan</button>
                        </div>
                    </form>

                </div>
                <div class="card-footer text-center bg-white py-3">
                    <a href="/tracking" class="text-decoration-none text-secondary">Cek Status Pengajuan Saya ➔</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
